# UserScript wrapper example

[config]
# All steps, including pre-processing:
# PROCESS_LIST = PcpCombine(met_format_obs_olr), PcpCombine(met_format_obs_u850), PcpCombine(met_format_obs_u200)
# Only RMM Analysis script for the observations
PROCESS_LIST = UserScript(script_rmm)

# time looping - options are INIT, VALID, RETRO, and REALTIME
# If set to INIT or RETRO:
#   INIT_TIME_FMT, INIT_BEG, INIT_END, and INIT_INCREMENT must also be set
# If set to VALID or REALTIME:
#   VALID_TIME_FMT, VALID_BEG, VALID_END, and VALID_INCREMENT must also be set
LOOP_BY = VALID

# Format of VALID_BEG and VALID_END using % items
# %Y = 4 digit year, %m = 2 digit month, %d = 2 digit day, etc.
# see www.strftime.org for more information
# %Y%m%d%H expands to YYYYMMDDHH
VALID_TIME_FMT = %Y%m%d%H

# Start time for METplus run
VALID_BEG = 2000010100

# End time for METplus run
VALID_END = 2002123000

# Increment between METplus runs in seconds. Must be >= 60
VALID_INCREMENT = 86400

# List of forecast leads to process for each run time (init or valid)
# In hours if units are not specified
# If unset, defaults to 0 (don't loop through forecast leads)
LEAD_SEQ = 0

# Order of loops to process data - Options are times, processes
# Not relevant if only one item is in the PROCESS_LIST
# times = run all wrappers in the PROCESS_LIST for a single run time, then
#   increment the run time and run all wrappers again until all times have
#   been evaluated.
# processes = run the first wrapper in the PROCESS_LIST for all times
#   specified, then repeat for the next item in the PROCESS_LIST until all
#   wrappers have been run
LOOP_ORDER = processes

# location of configuration files used by MET applications
CONFIG_DIR={PARM_BASE}/use_cases/model_applications/s2s

# Run the obs for these cases
OBS_RUN = True


# Convert OLR to MET Format
[met_format_obs_olr]
# run pcp_combine on obs data
OBS_PCP_COMBINE_RUN = {OBS_RUN}

# method to run pcp_combine on forecast data
# Options are ADD, SUM, SUBTRACT, DERIVE, and USER_DEFINED
OBS_PCP_COMBINE_METHOD = USER_DEFINED

# User defined pcp_combine command
OBS_PCP_COMBINE_COMMAND = -add {OBS_PCP_COMBINE_INPUT_DIR}/{OBS_PCP_COMBINE_INPUT_TEMPLATE} -field 'name="olr"; level="({valid?fmt=%Y%m%d_%H%M%S},*,*)"; file_type=NETCDF_NCCF; censor_thresh=eq-999.0; censor_val=-9999.0;'

# Set output variable name
OBS_PCP_COMBINE_OUTPUT_NAME = olr

# input and output data directories for each application in PROCESS_LIST
OBS_PCP_COMBINE_INPUT_DIR = {INPUT_BASE}/model_applications/s2s/UserScript_fcstGFS_obsERA_RMM
OBS_PCP_COMBINE_OUTPUT_DIR = {OUTPUT_BASE}/s2s/UserScript_fcstGFS_obsERA_RMM/ERA

# format of filenames
# Input ERA Interim
OBS_PCP_COMBINE_INPUT_TEMPLATE = olr.1x.7920.anom7901.nc
OBS_PCP_COMBINE_OUTPUT_TEMPLATE = OLR_{valid?fmt=%Y%m%d}.nc


# Convert u850 to MET Format
[met_format_obs_u850]
# run pcp_combine on obs data
OBS_PCP_COMBINE_RUN = {OBS_RUN}

# method to run pcp_combine on forecast data
# Options are ADD, SUM, SUBTRACT, DERIVE, and USER_DEFINED
OBS_PCP_COMBINE_METHOD = USER_DEFINED

# User defined pcp_combine command
OBS_PCP_COMBINE_COMMAND = -add {OBS_PCP_COMBINE_INPUT_DIR}/{OBS_PCP_COMBINE_INPUT_TEMPLATE} -field 'name="uwnd"; level="({valid?fmt=%Y%m%d_%H%M%S},*,*)"; file_type=NETCDF_NCCF; censor_thresh=eq-999.0; censor_val=-9999.0;'

# Set output variable name
OBS_PCP_COMBINE_OUTPUT_NAME = uwnd850

# input and output data directories for each application in PROCESS_LIST
OBS_PCP_COMBINE_INPUT_DIR = {INPUT_BASE}/model_applications/s2s/UserScript_fcstGFS_obsERA_RMM
OBS_PCP_COMBINE_OUTPUT_DIR = {OUTPUT_BASE}/s2s/UserScript_fcstGFS_obsERA_RMM/ERA

# format of filenames
# Input ERA Interim
OBS_PCP_COMBINE_INPUT_TEMPLATE = uwnd.erai.an.2p5.850.daily.anom7901.nc
OBS_PCP_COMBINE_OUTPUT_TEMPLATE = u850_{valid?fmt=%Y%m%d}.nc


# Convert u200 to MET Format
[met_format_obs_u200]
# run pcp_combine on obs data
OBS_PCP_COMBINE_RUN = {OBS_RUN}

# method to run pcp_combine on forecast data
# Options are ADD, SUM, SUBTRACT, DERIVE, and USER_DEFINED
OBS_PCP_COMBINE_METHOD = USER_DEFINED

# User defined pcp_combine command
OBS_PCP_COMBINE_COMMAND = -add {OBS_PCP_COMBINE_INPUT_DIR}/{OBS_PCP_COMBINE_INPUT_TEMPLATE} -field 'name="uwnd"; level="({valid?fmt=%Y%m%d_%H%M%S},*,*)"; file_type=NETCDF_NCCF; censor_thresh=eq-999.0; censor_val=-9999.0;'

# field name, level and setting time attribute of 1 hr accumulation in forecast files
#OBS_PCP_COMBINE_INPUT_NAMES = uwnd
#OBS_PCP_COMBINE_INPUT_LEVELS = "({valid?fmt=%Y%m%d_%H%M%S},*,*)"
#OBS_PCP_COMBINE_INPUT_OPTIONS = file_type=NETCDF_NCCF;

# Set output variable name
OBS_PCP_COMBINE_OUTPUT_NAME = uwnd200

# input and output data directories for each application in PROCESS_LIST
OBS_PCP_COMBINE_INPUT_DIR = {INPUT_BASE}/model_applications/s2s/UserScript_fcstGFS_obsERA_RMM
OBS_PCP_COMBINE_OUTPUT_DIR = {OUTPUT_BASE}/s2s/UserScript_fcstGFS_obsERA_RMM/ERA

# format of filenames
# Input ERA Interim
OBS_PCP_COMBINE_INPUT_TEMPLATE = uwnd.erai.an.2p5.200.daily.anom7901.nc
OBS_PCP_COMBINE_OUTPUT_TEMPLATE = u200_{valid?fmt=%Y%m%d}.nc


#
[compute_rmm]
# EOF files to use for OLR, U850, and U200
OLR_EOF_FILE = {INPUT_BASE}/model_applications/s2s/UserScript_fcstGFS_obsERA_RMM/EOF/
U850_EOF_FILE = {INPUT_BASE}/model_applications/s2s/UserScript_fcstGFS_obsERA_RMM/EOF/
U200_EOF_FILE = {INPUT_BASE}/model_applications/s2s/UserScript_fcstGFS_obsERA_RMM/EOF/

# Input filename templates for the observed OLR, U850, and U200
OBS_OLR_INPUT_TEMPLATE = {INPUT_BASE}/model_applications/s2s/UserScript_fcstGFS_obsERA_RMM/ERA/OLR_{valid?fmt=%Y%m%d}.nc
OBS_U850_INPUT_TEMPLATE = {INPUT_BASE}/model_applications/s2s/UserScript_fcstGFS_obsERA_RMM/ERA/u850_{valid?fmt=%Y%m%d}.nc
OBS_U200_INPUT_TEMPLATE = {INPUT_BASE}/model_applications/s2s/UserScript_fcstGFS_obsERA_RMM/ERA/u200_{valid?fmt=%Y%m%d}.nc

# Number of obs per day
OBS_PER_DAY = 1

# Plotting start and end dates
PHASE_PLOT_VALID_BEG = 20020101
PHASE_PLOT_VALID_END = 20021231


# Run the RMM Analysis Script
[script_rmm]
# list of strings to loop over for each run time.
# value for each item can be referenced in filename templates with {custom?fmt=%s}
USER_SCRIPT_CUSTOM_LOOP_LIST = nc

# Run the user script once
USER_SCRIPT_RUNTIME_FREQ = RUN_ONCE

# Command to run the user script with input configuration file
USER_SCRIPT_COMMAND = {METPLUS_BASE}/parm/use_cases/model_applications/s2s/UserScript_fcstGFS_obsERA_RMM/RMM_driver.py {METPLUS_BASE}/parm/use_cases/model_applications/s2s/UserScript_fcstGFS_obsERA_RMM.conf dir.INPUT_BASE={INPUT_BASE} dir.OUTPUT_BASE={OUTPUT_BASE} dir.MET_INSTALL_DIR={MET_INSTALL_DIR}
